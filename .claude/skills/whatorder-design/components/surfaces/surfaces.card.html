<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; }
  .light { background: var(--surface-app); padding: 1.75rem; }
  .dark { background: var(--bg); padding: 1.75rem; }
  h4 { margin: 0 0 0.4rem; font-size: var(--text-md); font-weight: 600; }
  .light h4 { color: var(--text-strong); }
  .dark h4 { color: var(--text); }
  p.body { margin: 0; font-size: var(--text-base); }
  .light p.body { color: var(--text-secondary); }
  .dark p.body { color: var(--text-muted); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Card } = window.WhatOrderDesignSystem_b54bed;
  function Demo() {
    return (
      <div className="grid">
        <div className="light">
          <Card surface="light">
            <h4>Income — Today</h4>
            <p className="body">€248.50 earned across 14 orders. WhatOrder fee €12.40.</p>
          </Card>
        </div>
        <div className="dark">
          <Card surface="dark" hover>
            <h4>Bot handles everything</h4>
            <p className="body">Menu, items, quantities, extras — all through interactive messages.</p>
          </Card>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
