<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../../styles.css" />
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; font-family: var(--font-sans); }
  .grid { display: grid; grid-template-columns: 1fr 1fr; }
  .light { background: var(--surface); padding: 1.5rem 1.75rem; }
  .dark { background: var(--bg); padding: 1.5rem 1.75rem; }
  .stack { display: flex; flex-direction: column; gap: 1rem; }
  .lbl { font-size: var(--text-xs); text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-quiet); margin: 0 0 0.75rem; font-weight: 600; }
  .lbl-d { color: var(--text-muted); }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
  const { Input, Select } = window.WhatOrderDesignSystem_b54bed;
  function Demo() {
    const [f, setF] = React.useState('active');
    return (
      <div className="grid">
        <div className="light">
          <p className="lbl">Dashboard — light</p>
          <div className="stack">
            <Input surface="light" label="Phone number" defaultValue="+43 660 123 4567" />
            <Select ariaLabel="Show" value={f} onChange={e=>setF(e.target.value)}
              options={[{value:'active',label:'Active orders'},{value:'done',label:'Completed — last 2 weeks'}]} />
          </div>
        </div>
        <div className="dark">
          <p className="lbl lbl-d">Marketing — dark</p>
          <div className="stack">
            <Input surface="dark" label="Restaurant name" placeholder="e.g. Kebap & Pizza Favoriten" />
            <Input surface="dark" label="WhatsApp / phone" placeholder="+43 660 1234567" />
          </div>
        </div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
