<!-- @dsCard group="Type" viewport="700x220" name="Display type" subtitle="Marketing — Inter, tracked tight, fluid clamps" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--bg); color: var(--text); padding: 1.75rem; }
  .hero { font-size: clamp(2rem,4vw,3.2rem); font-weight: var(--fw-bold); letter-spacing: var(--tracking-display); line-height: var(--lh-tight); margin: 0; }
  .hero em { font-style: normal; background: linear-gradient(135deg,var(--green-500),var(--green-700)); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
  .sub { font-size: var(--display-sub); font-weight: var(--fw-light); color: var(--text-muted); margin: 0.9rem 0 0; max-width: 460px; }
  .meta { font-size: var(--text-xs); color: var(--text-faint); font-family: var(--font-mono); margin: 1.1rem 0 0; }
</style>
</head>
<body>
  <p class="hero">Your restaurant,<br/>in <em>every conversation.</em></p>
  <p class="sub">Customers order through WhatsApp — the app they already have open.</p>
  <p class="meta">700 bold · tracking −0.04em · line-height 1.1 · gradient on emphasis</p>
</body>
</html>
