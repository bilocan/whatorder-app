<!-- @dsCard group="Colors" viewport="700x150" name="Light neutrals" subtitle="Dashboard surface — paper & slate scale" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface); padding: 1.5rem; }
  .row { display: flex; gap: 0.6rem; flex-wrap: wrap; }
  .sw { flex: 1; min-width: 70px; }
  .chip { height: 58px; border-radius: var(--radius-md); border: 1px solid var(--surface-border); }
  .name { font-size: var(--text-xs); font-weight: 600; color: var(--text-strong); margin: 0.45rem 0 0.1rem; }
  .hex { font-size: var(--text-xs); color: var(--text-quiet); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--paper-050)"></div><p class="name">paper-050</p><p class="hex">#FAFAFA</p></div>
    <div class="sw"><div class="chip" style="background:var(--paper-150)"></div><p class="name">paper-150</p><p class="hex">#F5F5F5</p></div>
    <div class="sw"><div class="chip" style="background:var(--line-300)"></div><p class="name">line-300</p><p class="hex">#E5E7EB</p></div>
    <div class="sw"><div class="chip" style="background:var(--slate-400)"></div><p class="name">slate-400</p><p class="hex">#999999</p></div>
    <div class="sw"><div class="chip" style="background:var(--slate-600)"></div><p class="name">slate-600</p><p class="hex">#555555</p></div>
    <div class="sw"><div class="chip" style="background:var(--slate-900)"></div><p class="name">slate-900</p><p class="hex">#213547</p></div>
    <div class="sw"><div class="chip" style="background:var(--slate-ink)"></div><p class="name">slate-ink</p><p class="hex">#000000</p></div>
  </div>
</body>
</html>
