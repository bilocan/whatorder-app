<!-- @dsCard group="Type" viewport="700x150" name="Weights & mono" subtitle="Inter 300–700 and the monospace ID stack" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--surface); color: var(--text-strong); padding: 1.5rem 1.75rem; }
  .weights { display: flex; gap: 1.5rem; flex-wrap: wrap; align-items: baseline; }
  .w { font-size: 1.5rem; }
  .w span { display: block; font-size: 0.62rem; font-family: var(--font-mono); color: var(--text-quiet); font-weight: 400; margin-top: 0.2rem; }
  .mono { margin-top: 1.25rem; font-family: var(--font-mono); font-size: var(--text-base); color: var(--text-tertiary); }
  .mono b { color: var(--text-strong); font-weight: 400; }
</style>
</head>
<body>
  <div class="weights">
    <div class="w" style="font-weight:300">Aa<span>300 Light</span></div>
    <div class="w" style="font-weight:400">Aa<span>400 Regular</span></div>
    <div class="w" style="font-weight:500">Aa<span>500 Medium</span></div>
    <div class="w" style="font-weight:600">Aa<span>600 Semibold</span></div>
    <div class="w" style="font-weight:700">Aa<span>700 Bold</span></div>
  </div>
  <p class="mono">Order IDs & codes → <b>#A1B2C3</b> · <b>+43 660 123 4567</b> · <b>123456</b></p>
</body>
</html>
