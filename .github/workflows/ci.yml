name: CI

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install
        working-directory: backend

      - name: Run backend tests with coverage
        working-directory: backend
        run: npm test -- --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./backend/coverage/lcov.info
          flags: backend
          fail_ci_if_error: false

  # Intent corpus eval — separate job so PR checks show "Intent Corpus Eval" explicitly.
  # Rules-only (no LLM API). Builtin + Enes pilot golden phrases.
  #
  # To disable if this gate blocks merges while corpus stabilizes:
  #   1. Add `if: false` on the job below (or comment out the whole intent-corpus job).
  #   2. Change deploy-backend `needs` from [backend, intent-corpus] to `backend` only —
  #      otherwise deploy is skipped when this job is skipped.
  # Jest still runs intentEval.test.js inside Backend Tests as a lighter backup.
  intent-corpus:
    name: Intent Corpus Eval
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm install
        working-directory: backend

      - name: Builtin corpus (rules-only)
        working-directory: backend
        run: npm run intent:eval -- --ci

      - name: Enes pilot corpus (rules-only)
        working-directory: backend
        run: npm run intent:eval -- --restaurant enes

  dashboard:
    name: Dashboard Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        working-directory: dashboard
        run: npm install

      - name: TypeScript + build
        working-directory: dashboard
        run: npm run build

      - name: ESLint
        working-directory: dashboard
        run: npx eslint src --max-warnings 0

      - name: Tests
        working-directory: dashboard
        run: npm test

  # Enforces the promotion flow: master only accepts PRs whose source branch is
  # dev. Required status check in the "master — release branch" ruleset, so a PR
  # from any other branch cannot be merged. Feature branches merge into dev.
  master-merge-guard:
    name: Master merge guard (dev only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'master'

    steps:
      - name: Fail unless source branch is dev
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          echo "PR: $HEAD_REF -> master"
          if [ "$HEAD_REF" != "dev" ]; then
            echo "::error::PRs into master are only allowed from dev. Merge into dev first; dev promotes to master."
            exit 1
          fi

  # Continuous deployment to TEST only: push to dev → Test (whatorder-fire).
  # Merges to master do NOT deploy — production ships when a GitHub Release is
  # published (see .github/workflows/release.yml, Production environment).
  # Environment variables (GCP_PROJECT, FIREBASE_HOSTING_SA) and secrets
  # (WIF_PROVIDER, WIF_SERVICE_ACCOUNT, VITE_*) live on the environments in
  # GitHub repo settings; repo-level secrets act as the Test fallback.
  deploy-backend:
    name: Deploy Backend to Cloud Run
    runs-on: ubuntu-latest
    needs: [backend, intent-corpus]
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    environment: Test
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west3-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker build -t europe-west3-docker.pkg.dev/${{ vars.GCP_PROJECT }}/cloud-run-source-deploy/whatorder-backend:${{ github.sha }} backend/
          docker push europe-west3-docker.pkg.dev/${{ vars.GCP_PROJECT }}/cloud-run-source-deploy/whatorder-backend:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          project_id: ${{ vars.GCP_PROJECT }}
          service: whatorder-backend
          region: europe-west3
          image: europe-west3-docker.pkg.dev/${{ vars.GCP_PROJECT }}/cloud-run-source-deploy/whatorder-backend:${{ github.sha }}
          flags: --min-instances=1 --allow-unauthenticated
          env_vars: |
            DEPLOY_ENV=test
            GIT_SHA=${{ github.sha }}
            APP_VERSION=dev-${{ github.sha }}

  deploy-dashboard:
    name: Deploy Dashboard to Firebase Hosting
    runs-on: ubuntu-latest
    needs: dashboard
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    environment: Test
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          # 24.17 breaks firebase-tools JWT token exchange (Premature close).
          # https://github.com/firebase/firebase-tools/issues/10692
          node-version: '24.16.0'

      - name: Install dependencies
        working-directory: dashboard
        run: npm install

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.VITE_WHATSAPP_PHONE_NUMBER_ID }}
          VITE_DEPLOY_ENV: test
          VITE_GIT_SHA: ${{ github.sha }}
          VITE_APP_VERSION: dev-${{ github.sha }}

      # Keyless hosting deploy: firebase-tools picks up the WIF credentials
      # exported by google-github-actions/auth (GOOGLE_APPLICATION_CREDENTIALS).
      # whatorder-fire-prod enforces iam.disableServiceAccountKeyCreation, so
      # the JSON-key based FirebaseExtended/action-hosting-deploy can't be used.
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ vars.FIREBASE_HOSTING_SA }}

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@15.22.1 deploy --only hosting --project ${{ vars.GCP_PROJECT }}
