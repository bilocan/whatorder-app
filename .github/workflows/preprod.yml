name: Deploy to Preproduction

# Preprod = prod-parity release candidate. Push to master (after dev → master
# promote PR) builds once and deploys to pre surfaces in whatorder-fire-prod.
# Production release promotes the same image SHA — see release.yml.

on:
  push:
    branches: [master]

# One preprod deploy at a time, in push order. Queued (not cancelled) so a
# half-finished deploy is never aborted mid-flight; the release SHA gate
# depends on preprod ending up on the latest master commit.
concurrency:
  group: preprod-deploy
  cancel-in-progress: false

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.16.0'

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Run backend tests with coverage
        working-directory: backend
        run: npm test -- --coverage

  intent-corpus:
    name: Intent Corpus Eval
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.16.0'

      - name: Install dependencies
        run: npm ci
        working-directory: backend

      - name: Builtin corpus (rules-only)
        working-directory: backend
        run: npm run intent:eval -- --ci

      - name: Enes pilot corpus (rules-only)
        working-directory: backend
        run: npm run intent:eval -- --restaurant enes

  dashboard:
    name: Dashboard Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.16.0'

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: TypeScript + build
        working-directory: dashboard
        run: npm run build

      - name: ESLint
        working-directory: dashboard
        run: npx eslint src --max-warnings 0

      - name: Tests
        working-directory: dashboard
        run: npm test

  # Both deploys gate on ALL test jobs: preprod must never become a mismatched
  # pair (new dashboard + old backend or vice versa) because one suite failed.
  deploy-backend-pre:
    name: Deploy Backend to Cloud Run (preprod)
    runs-on: ubuntu-latest
    needs: [backend, intent-corpus, dashboard]
    environment: Preproduction
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Verify Preproduction environment config
        run: |
          if [ -z "${{ vars.GCP_PROJECT }}" ]; then
            echo "::error::Preproduction environment is missing variable GCP_PROJECT (set to whatorder-fire-prod — copy from Production environment)."
            exit 1
          fi
          if [ -z "${{ secrets.WIF_PROVIDER }}" ] || [ -z "${{ secrets.WIF_SERVICE_ACCOUNT }}" ]; then
            echo "::error::Preproduction environment is missing WIF_PROVIDER or WIF_SERVICE_ACCOUNT secrets (copy from Production)."
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker europe-west3-docker.pkg.dev --quiet

      - name: Build and push image
        run: |
          docker build -t europe-west3-docker.pkg.dev/${{ vars.GCP_PROJECT }}/cloud-run-source-deploy/whatorder-backend:${{ github.sha }} backend/
          docker push europe-west3-docker.pkg.dev/${{ vars.GCP_PROJECT }}/cloud-run-source-deploy/whatorder-backend:${{ github.sha }}

      # --service-account pins the runtime SA to the same account live prod
      # uses, so preprod exercises identical IAM (its main reason to exist).
      # FIRESTORE_DATABASE_ID isolates preprod writes into the named "preprod"
      # database in whatorder-fire-prod — never the live (default) database.
      - name: Deploy to Cloud Run (pre service)
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          project_id: ${{ vars.GCP_PROJECT }}
          service: whatorder-backend-pre
          region: europe-west3
          image: europe-west3-docker.pkg.dev/${{ vars.GCP_PROJECT }}/cloud-run-source-deploy/whatorder-backend:${{ github.sha }}
          flags: --min-instances=0 --allow-unauthenticated --service-account=87472938058-compute@developer.gserviceaccount.com
          env_vars: |
            DEPLOY_ENV=preproduction
            GIT_SHA=${{ github.sha }}
            APP_VERSION=pre-${{ github.sha }}
            FIRESTORE_DATABASE_ID=preprod

      # Pre runtime env vars were copied from prod once and drift silently.
      # Warn (don't fail) when the var NAMES diverge, ignoring the ones that
      # legitimately differ. Values can't be compared (secrets), names can.
      - name: Check env var parity with live prod backend
        run: |
          IGNORE='^(DEPLOY_ENV|GIT_SHA|APP_VERSION|FIRESTORE_DATABASE_ID|BACKEND_URL)$'
          names() {
            gcloud run services describe "$1" \
              --region europe-west3 --project ${{ vars.GCP_PROJECT }} --format json \
              | jq -r '.spec.template.spec.containers[0].env[]?.name' \
              | grep -Ev "$IGNORE" | sort
          }
          names whatorder-backend > /tmp/prod-env-names
          names whatorder-backend-pre > /tmp/pre-env-names
          MISSING=$(comm -23 /tmp/prod-env-names /tmp/pre-env-names)
          EXTRA=$(comm -13 /tmp/prod-env-names /tmp/pre-env-names)
          if [ -n "$MISSING" ]; then
            echo "::warning::Pre backend is missing prod env vars (preprod is not validating prod config): $(echo $MISSING | tr '\n' ' ')"
          fi
          if [ -n "$EXTRA" ]; then
            echo "::warning::Pre backend has env vars prod lacks: $(echo $EXTRA | tr '\n' ' ')"
          fi
          if [ -z "$MISSING" ] && [ -z "$EXTRA" ]; then
            echo "OK: pre and prod backend env var names match"
          fi

  deploy-dashboard-pre:
    name: Deploy Dashboard to Firebase Hosting (preprod)
    runs-on: ubuntu-latest
    needs: [backend, intent-corpus, dashboard]
    environment: Preproduction
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Verify Preproduction environment config
        run: |
          if [ -z "${{ vars.GCP_PROJECT }}" ]; then
            echo "::error::Preproduction environment is missing variable GCP_PROJECT (set to whatorder-fire-prod — copy from Production environment)."
            exit 1
          fi
          if [ -z "${{ vars.FIREBASE_HOSTING_SA }}" ]; then
            echo "::error::Preproduction environment is missing variable FIREBASE_HOSTING_SA (copy from Production environment)."
            exit 1
          fi
          if [ -z "${{ secrets.WIF_PROVIDER }}" ]; then
            echo "::error::Preproduction environment is missing WIF_PROVIDER secret (copy from Production)."
            exit 1
          fi

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.16.0'

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.VITE_WHATSAPP_PHONE_NUMBER_ID }}
          VITE_DEPLOY_ENV: preproduction
          VITE_GIT_SHA: ${{ github.sha }}
          VITE_APP_VERSION: pre-${{ github.sha }}
          VITE_FIRESTORE_DATABASE_ID: preprod

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ vars.FIREBASE_HOSTING_SA }}

      - name: Deploy to Firebase Hosting (pre site)
        run: npx firebase-tools@15.22.1 deploy --only hosting:whatorder-pre --project ${{ vars.GCP_PROJECT }}

  # Post-deploy smoke: assert the pre backend actually serves this commit.
  # Uses the same VITE_API_URL secret as the release SHA gate, so a wrong or
  # missing value surfaces here — on merge day — instead of at release time.
  smoke:
    name: Preprod smoke (version gate)
    runs-on: ubuntu-latest
    needs: [deploy-backend-pre, deploy-dashboard-pre]
    environment: Preproduction

    steps:
      - name: Verify /version serves this commit
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "::error::VITE_API_URL is not set on the Preproduction environment — the release workflow will hard-fail without it."
            exit 1
          fi
          EXPECTED="${GITHUB_SHA:0:7}"
          # min-instances=0: allow cold start + revision rollout to settle
          for i in $(seq 1 10); do
            BODY=$(curl -sf --max-time 30 "${VITE_API_URL%/}/version") && break
            echo "attempt $i failed; retrying in 15s"
            sleep 15
          done
          if [ -z "$BODY" ]; then
            echo "::error::Pre backend /version unreachable after 10 attempts."
            exit 1
          fi
          echo "$BODY"
          ENV=$(echo "$BODY" | jq -r '.environment // empty')
          ACTUAL=$(echo "$BODY" | jq -r '.gitSha // empty')
          if [ "$ENV" != "preproduction" ]; then
            echo "::error::Expected environment=preproduction, got '$ENV'. VITE_API_URL may point at the wrong service."
            exit 1
          fi
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::Pre backend serves gitSha '$ACTUAL', expected '$EXPECTED'."
            exit 1
          fi
          echo "OK: preprod serves $EXPECTED (environment=preproduction)"
