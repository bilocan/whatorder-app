# Destructive: wipes transactional Firestore data and re-imports golden infra backup.
# Manual trigger only — never runs on push/PR.
name: Firestore production reset

on:
  workflow_dispatch:
    inputs:
      infra_backup_folder:
        description: 'GCS folder under gs://whatorder-fire-backups/manual/ (golden infra export)'
        required: true
        default: '2026-06-27-in8ra'
        type: string
      confirm:
        description: 'Type RESET to confirm destructive reset on whatorder-fire'
        required: true
        type: string

jobs:
  reset:
    name: Reset DB + infra import + smoke
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'RESET'
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Production reset (cleanup + infra import + smoke)
        working-directory: backend
        env:
          FIREBASE_PROJECT_ID: whatorder-fire
          GOLDEN_INFRA_BACKUP: ${{ github.event.inputs.infra_backup_folder }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        run: |
          npm run firestore:reset-production -- --confirm --infra-backup="${{ github.event.inputs.infra_backup_folder }}"

  rejected:
    name: Confirmation required
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm != 'RESET'
    steps:
      - name: Abort — confirmation mismatch
        run: |
          echo "Aborted: type RESET in the confirm field to run this workflow."
          exit 1
