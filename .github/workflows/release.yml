name: Release to Production

# Production is release-driven: merges to master deploy Preprod (preprod.yml).
# Publishing a GitHub Release promotes the same image SHA to live prod services —
# no backend rebuild. Dashboard is rebuilt with production labels only.
#
#   gh release create v2026.07.0 --target master --generate-notes
#
# Tests are not re-run here: master only accepts PRs from dev with all CI
# checks green, and preprod.yml re-runs the suite on every master push.

on:
  release:
    types: [published]

# One production release at a time, never cancelled mid-flight.
concurrency:
  group: prod-release
  cancel-in-progress: false

jobs:
  guard:
    name: Release guard (tag on master)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify the released commit is on master
        run: |
          git fetch --no-tags origin master
          if git merge-base --is-ancestor "$GITHUB_SHA" origin/master; then
            echo "OK: released commit $GITHUB_SHA is on master"
          else
            echo "::error::Release tag must point to a commit on master. Delete the release/tag and re-create it with --target master."
            exit 1
          fi

  verify-artifact:
    name: Verify preprod image exists
    runs-on: ubuntu-latest
    needs: guard
    environment: Production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Confirm Artifact Registry image for this SHA
        run: |
          IMAGE="europe-west3-docker.pkg.dev/${{ vars.GCP_PROJECT }}/cloud-run-source-deploy/whatorder-backend:${{ github.sha }}"
          echo "Checking $IMAGE"
          gcloud artifacts docker images describe "$IMAGE" --format='value(image_summary.digest)'

  verify-preprod-sha:
    name: Verify preprod backend SHA
    runs-on: ubuntu-latest
    needs: guard
    environment: Preproduction

    steps:
      - name: Confirm preprod /version matches release commit
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "::error::VITE_API_URL is not set on the Preproduction environment. This gate must not be skippable — set it to the pre backend URL (see deploy-test-to-prod guide)."
            exit 1
          fi
          BODY=$(curl -sf "${VITE_API_URL%/}/version")
          echo "$BODY"
          ENV=$(echo "$BODY" | jq -r '.environment // empty')
          if [ "$ENV" = "production" ]; then
            echo "::error::VITE_API_URL on Preproduction points at live prod backend (environment=production). It must be the pre service: https://whatorder-backend-pre-87472938058.europe-west3.run.app"
            exit 1
          fi
          EXPECTED="${GITHUB_SHA:0:7}"
          ACTUAL=$(echo "$BODY" | jq -r '.gitSha // empty')
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::Preprod gitSha $ACTUAL does not match release $EXPECTED. Wait for Deploy to Preproduction workflow on master, or re-run it."
            exit 1
          fi
          echo "OK: preprod serves $EXPECTED"

  deploy-backend:
    name: Promote Backend to Cloud Run (prod)
    runs-on: ubuntu-latest
    needs: [verify-artifact, verify-preprod-sha]
    environment: Production
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      # --service-account pins the runtime SA so pre and prod always run with
      # identical IAM — preprod's whole point is catching prod IAM gaps.
      - name: Promote preprod image to live backend service
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          project_id: ${{ vars.GCP_PROJECT }}
          service: whatorder-backend
          region: europe-west3
          image: europe-west3-docker.pkg.dev/${{ vars.GCP_PROJECT }}/cloud-run-source-deploy/whatorder-backend:${{ github.sha }}
          flags: --min-instances=1 --allow-unauthenticated --service-account=87472938058-compute@developer.gserviceaccount.com
          env_vars: |
            DEPLOY_ENV=production
            GIT_SHA=${{ github.sha }}
            APP_VERSION=${{ github.event.release.tag_name }}

      # Alias the promoted image with the release tag so Artifact Registry
      # shows which SHA shipped as which release.
      - name: Tag image with release tag in Artifact Registry
        run: |
          gcloud artifacts docker tags add \
            europe-west3-docker.pkg.dev/${{ vars.GCP_PROJECT }}/cloud-run-source-deploy/whatorder-backend:${{ github.sha }} \
            europe-west3-docker.pkg.dev/${{ vars.GCP_PROJECT }}/cloud-run-source-deploy/whatorder-backend:${{ github.event.release.tag_name }}

  # Gated on the same verify jobs as the backend promotion: if either check
  # fails, neither surface ships — a dashboard-only deploy would put a frontend
  # in prod whose backend was never promoted (version mismatch).
  deploy-dashboard:
    name: Deploy Dashboard to Firebase Hosting (prod)
    runs-on: ubuntu-latest
    needs: [guard, verify-artifact, verify-preprod-sha]
    environment: Production
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24.16.0'

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard (production labels, same commit)
        working-directory: dashboard
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
          VITE_WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.VITE_WHATSAPP_PHONE_NUMBER_ID }}
          VITE_DEPLOY_ENV: production
          VITE_GIT_SHA: ${{ github.sha }}
          VITE_APP_VERSION: ${{ github.event.release.tag_name }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ vars.FIREBASE_HOSTING_SA }}

      - name: Deploy to Firebase Hosting (prod site)
        run: npx firebase-tools@15.22.1 deploy --only hosting:whatorder-fire-prod --project ${{ vars.GCP_PROJECT }}
